name: docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-base:
    name: Publish imagor base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant:
          - name: default
            build_args: ""
          - name: magick
            build_args: ENABLE_MAGICK=true
          - name: mozjpeg
            build_args: ENABLE_MOZJPEG=true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read image tag
        id: versions
        run: |
          chmod +x image-tag.sh
          echo "image_tag=$(./image-tag.sh ${{ matrix.variant.name }})" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.versions.outputs.image_tag }}
            type=raw,value=latest-${{ matrix.variant.name }},enable=${{ github.ref == 'refs/heads/master' && matrix.variant.name != 'default' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' && matrix.variant.name == 'default' }}

      - name: Build and push imagor base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: ${{ matrix.variant.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
