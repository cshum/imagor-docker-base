name: docker

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-base:
    name: Publish imagor base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        variant:
          - name: default
            suffix: ""
            build_args: ""
          - name: magick
            suffix: -magick
            build_args: ENABLE_MAGICK=true
          - name: mozjpeg
            suffix: -mozjpeg
            build_args: ENABLE_MOZJPEG=true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read libvips version
        id: versions
        run: |
          source versions.sh
          echo "vips_version=${VIPS_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=vips-${{ steps.versions.outputs.vips_version }}${{ matrix.variant.suffix }}
            type=raw,value=latest${{ matrix.variant.suffix }},enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push imagor base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: ${{ matrix.variant.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
